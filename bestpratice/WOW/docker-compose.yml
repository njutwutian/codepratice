services:
  mysql:
    image: m.daocloud.io/docker.io/mysql:8.4
    container_name: wow-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: golden_mount
    ports:
      - "3306:3306"
    volumes:
      - D:/mysqlData:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - wow-net

  goldenmount:
    build:
      context: ./src/GoldenMount
    container_name: wow-goldenmount
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/golden_mount?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DRIVER: com.mysql.cj.jdbc.Driver
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - wow-net

  northtoward:
    build:
      context: ./src/NorthToward
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: wow-northtoward
    depends_on:
      - goldenmount
    ports:
      - "8088:80"
    restart: unless-stopped
    networks:
      - wow-net

  adminer:
    image: m.daocloud.io/docker.io/adminer:4
    container_name: wow-adminer
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - wow-net

networks:
  wow-net:
    driver: bridge
